name: Daily Skandia Scrape

on:
  schedule:
    # 7:00 AM Bogotá = 12:00 UTC (Colombia es UTC-5 sin DST)
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Permite disparar manualmente desde GitHub → Actions → Run workflow

jobs:
  scrape:
    name: Scrape Skandia
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias (sin Chrome)
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Instalar Chrome para Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Ejecutar scrape diario
        run: node src/run-job.js
        env:
          NODE_ENV: production
          SKANDIA_USER: ${{ secrets.SKANDIA_USER }}
          SKANDIA_PASSWORD: ${{ secrets.SKANDIA_PASSWORD }}
          SKANDIA_URL: https://cliente.skandia.com.co/wps/portal/clientes/LoginOM/
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: sebastiancanoarias@gmail.com
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

      - name: Notificar fallo por email
        if: failure()
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "Skandia Monitor <onboarding@resend.dev>",
              "to": ["sebastiancanoarias@gmail.com"],
              "subject": "ALERTA: Skandia Monitor falló hoy",
              "html": "<h2>El scrape diario falló</h2><p>Revisa los logs en <a href=\"https://github.com/Thesleshart/skandia-monitor/actions\">GitHub Actions</a></p>"
            }'
